<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level-Up</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-color: #121212; --panel-bg: #1e1e1e; --accent: #00ffcc;
            --text-main: #ffffff; --text-muted: #aaaaaa;
            --day-bg: #2a2a2a; --day-completed: #00ffcc; --day-current: #ffaa00;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        h1 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; text-align: center; }
        .dashboard {
            background-color: var(--panel-bg); border: 2px solid #333; border-radius: 12px;
            padding: 20px; width: 100%; max-width: 600px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.05); margin-bottom: 20px;
        }
        
        /* Auth UI */
        .auth-panel { text-align: center; margin-bottom: 15px; padding: 10px; background: #222; border-radius: 8px; }
        .auth-input { padding: 8px; margin: 5px; border-radius: 4px; border: 1px solid #444; background: #333; color: white; }
        .btn { padding: 8px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-secondary { background: #444; color: white; }
        
        /* Layout Elements */
        .stats-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .score-display { font-size: 20px; font-weight: bold; }
        .score-display span { color: var(--accent); font-size: 28px; }
        .day-tracker { font-size: 16px; color: var(--day-current); font-weight: bold; border: 1px solid var(--day-current); padding: 5px 10px; border-radius: 5px; }
        
        .calendar-section { margin-top: 15px; margin-bottom: 15px; text-align: center; }
        .calendar-grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 4px; margin-top: 10px; }
        .day-box { aspect-ratio: 1; background-color: var(--day-bg); border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 10px; transition: 0.3s; }
        .day-box.completed { background-color: var(--day-completed); box-shadow: 0 0 5px var(--day-completed); }
        .day-box.current { border: 2px solid var(--day-current); }

        .progress-bar-container { width: 100%; background-color: #333; border-radius: 10px; height: 15px; overflow: hidden; margin-bottom: 20px; }
        .progress-fill { height: 100%; background-color: var(--accent); width: 0%; transition: width 0.4s ease; }

        .task-section h2 { border-bottom: 1px solid #444; padding-bottom: 5px; font-size: 18px; color: var(--text-muted); text-transform: uppercase; display: flex; justify-content: space-between; }
        .task-item { display: flex; align-items: center; background-color: #2a2a2a; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .task-item input[type="checkbox"] { margin-right: 15px; width: 20px; height: 20px; accent-color: var(--accent); cursor: pointer; }
        .task-title { font-weight: bold; font-size: 16px; }
        .task-points { font-size: 12px; color: var(--accent); margin-top: 3px; display: block; }

        /* Reset Button Styling */
        .reset-btn {
            background-color: transparent;
            color: #ff4444;
            border: 1px solid #ff4444;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }

        .reset-btn:hover {
            background-color: #ff4444;
            color: white;
        }
    </style>
</head>
<body>

    <h1>Level Up: 90-Day Protocol</h1>
    
    <div class="dashboard auth-panel" id="authSection">
        <div id="loginForm">
            <h3 style="margin-top:0;">Cloud Sync Account</h3>
            <input type="email" id="email" class="auth-input" placeholder="Email">
            <input type="password" id="password" class="auth-input" placeholder="Password">
            <br>
            <button class="btn btn-primary" onclick="login()">Log In</button>
            <button class="btn btn-secondary" onclick="register()">Sign Up</button>
            <p id="authError" style="color: #ff4444; font-size: 12px;"></p>
        </div>
        <div id="loggedInView" style="display: none;">
            <p style="margin: 0;">Logged in as: <span id="userEmail" style="color: var(--accent);"></span></p>
            <button class="btn btn-secondary" style="margin-top: 10px;" onclick="logout()">Log Out</button>
        </div>
    </div>

    <div id="appInterface">
        <div class="dashboard">
            <div class="stats-container">
                <div class="score-display">EXP: <span id="currentPoints">0</span> / 500</div>
                <div class="day-tracker" id="dayTracker">Day 1 / 90</div>
            </div>
            
            <div class="progress-bar-container">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            
            <div class="calendar-section">
                <div style="font-size: 12px; color: var(--text-muted); text-align: left;">3-Month Consistency Grid</div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>
        </div>

        <div class="dashboard">
            <div class="task-section">
                <h2>Nutrition (+10 EXP)</h2>
                <label class="task-item"><input type="checkbox" id="cb_protein" class="task-checkbox" value="5" onchange="updatePoints(this)">
                    <div><span class="task-title">Hit 120g-140g Protein</span><span class="task-points">+5 EXP</span></div></label>
                <label class="task-item"><input type="checkbox" id="cb_calories" class="task-checkbox" value="5" onchange="updatePoints(this)">
                    <div><span class="task-title">Caloric Surplus Maintained</span><span class="task-points">+5 EXP</span></div></label>
            </div>

            <div class="task-section">
                <h2>Calisthenics (+20 EXP) <span id="weekIndicator" style="color: var(--accent); font-size: 14px;">Week 1</span></h2>
                
                <label class="task-item">
                    <input type="checkbox" id="cb_workout_upper" class="task-checkbox" value="5" onchange="updatePoints(this)">
                    <div>
                        <span class="task-title" id="text_upper">Upper Body</span>
                        <span class="task-points" id="desc_upper">+5 EXP</span>
                    </div>
                </label>

                <label class="task-item">
                    <input type="checkbox" id="cb_workout_lower" class="task-checkbox" value="5" onchange="updatePoints(this)">
                    <div>
                        <span class="task-title" id="text_lower">Lower Body</span>
                        <span class="task-points" id="desc_lower">+5 EXP</span>
                    </div>
                </label>

                <label class="task-item">
                    <input type="checkbox" id="cb_workout_back" class="task-checkbox" value="5" onchange="updatePoints(this)">
                    <div>
                        <span class="task-title" id="text_back">Back / Pulls</span>
                        <span class="task-points" id="desc_back">+5 EXP</span>
                    </div>
                </label>

                <label class="task-item">
                    <input type="checkbox" id="cb_workout_core" class="task-checkbox" value="5" onchange="updatePoints(this)">
                    <div>
                        <span class="task-title" id="text_core">Core Strength</span>
                        <span class="task-points" id="desc_core">+5 EXP</span>
                    </div>
                </label>
            </div>
            
            <div class="task-section" style="margin-bottom: 0;">
                <h2>Hygiene (+10 EXP)</h2>
                <label class="task-item" style="margin-bottom: 0;"><input type="checkbox" id="cb_hygiene" class="task-checkbox" value="10" onchange="updatePoints(this)">
                    <div><span class="task-title">Daily Body Care Routine Executed</span><span class="task-points">+10 EXP</span></div></label>
            </div>
        </div>
    </div>

    <button class="reset-btn" style="border-color: #666; color: #666; margin-top: 20px; margin-bottom: 40px;" onclick="hardReset()">Hard Reset (Wipe Cloud Data)</button>

    <script>
        // ==========================================
        // PASTE YOUR FIREBASE CONFIGURATION HERE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAQqPjM9TlwRFXnSFs1rkXFApXSOrI3hOw",
            authDomain: "glow-up-protocol.firebaseapp.com",
            projectId: "glow-up-protocol",
            storageBucket: "glow-up-protocol.firebasestorage.app",
            messagingSenderId: "58663914559",
            appId: "1:58663914559:web:96016980d10e1331d87c8a",
            measurementId: "G-0EWGLZ0TT6"
        };
        // ==========================================

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const MAX_POINTS = 500;
        const TOTAL_DAYS = 90;
        let currentUser = null;

        // Core App State
        let totalPoints = 0;
        let startDate = new Date().getTime();
        let completedWorkoutsArray = Array(TOTAL_DAYS).fill(false);
        let currentDayNum = 1;

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('loggedInView').style.display = 'block';
                document.getElementById('userEmail').innerText = user.email;
                syncDataFromCloud();
            } else {
                currentUser = null;
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('loggedInView').style.display = 'none';
                calculateDates();
                refreshUI();
            }
        });

        function register() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            auth.createUserWithEmailAndPassword(e, p).catch(err => document.getElementById('authError').innerText = err.message);
        }

        function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => document.getElementById('authError').innerText = err.message);
        }

        function logout() { auth.signOut(); }

        async function syncDataFromCloud() {
            if (!currentUser) return;
            const docRef = db.collection('users').doc(currentUser.uid);
            const doc = await docRef.get();
            if (doc.exists) {
                const data = doc.data();
                totalPoints = data.points || 0;
                startDate = data.startDate || new Date().getTime();
                completedWorkoutsArray = data.calendar || Array(TOTAL_DAYS).fill(false);
                const boxes = data.todaysCheckboxes || {};
                document.querySelectorAll('.task-checkbox').forEach(cb => {
                    cb.checked = boxes[cb.id] === true;
                });
            } else {
                saveDataToCloud();
            }
            calculateDates();
            checkMidnightReset();
            calculateDynamicWorkout();
            refreshUI();
            renderCalendar();
        }

        function saveDataToCloud() {
            if (!currentUser) return;
            let checkboxStates = {};
            document.querySelectorAll('.task-checkbox').forEach(cb => {
                checkboxStates[cb.id] = cb.checked;
            });
            db.collection('users').doc(currentUser.uid).set({
                points: totalPoints,
                startDate: startDate,
                calendar: completedWorkoutsArray,
                todaysCheckboxes: checkboxStates,
                lastActiveDate: new Date().toLocaleDateString("en-IN", {timeZone: "Asia/Kolkata"})
            }, { merge: true });
        }

        function calculateDates() {
            const start = new Date(startDate);
            const now = new Date();
            const diff = now.getTime() - start.getTime();
            currentDayNum = Math.floor(diff / (1000 * 60 * 60 * 24)) + 1;
            if (currentDayNum > TOTAL_DAYS) currentDayNum = TOTAL_DAYS;
            document.getElementById('dayTracker').innerText = `Day ${currentDayNum} / 90`;
        }

        async function checkMidnightReset() {
            if(!currentUser) return;
            const currentIST = new Date().toLocaleDateString("en-IN", {timeZone: "Asia/Kolkata"});
            const doc = await db.collection('users').doc(currentUser.uid).get();
            if(doc.exists && doc.data().lastActiveDate !== currentIST) {
                document.querySelectorAll('.task-checkbox').forEach(cb => cb.checked = false);
                saveDataToCloud();
            }
        }

        function updatePoints(checkbox) {
            const val = parseInt(checkbox.value);
            totalPoints += checkbox.checked ? val : -val;
            const w1 = document.getElementById('cb_workout_upper').checked;
            const w2 = document.getElementById('cb_workout_lower').checked;
            const w3 = document.getElementById('cb_workout_back').checked;
            const w4 = document.getElementById('cb_workout_core').checked;
            completedWorkoutsArray[currentDayNum - 1] = (w1 && w2 && w3 && w4);
            refreshUI();
            renderCalendar();
            saveDataToCloud();
        }

        function calculateDynamicWorkout() {
            const week = Math.ceil(currentDayNum / 7);
            document.getElementById('weekIndicator').innerText = `Week ${week > 12 ? 12 : week}`;
            
            const txt = { u: document.getElementById('text_upper'), l: document.getElementById('text_lower'), b: document.getElementById('text_back'), c: document.getElementById('text_core') };
            const desc = { u: document.getElementById('desc_upper'), l: document.getElementById('desc_lower'), b: document.getElementById('desc_back'), c: document.getElementById('desc_core') };
            
            // Progression logic with Sets/Reps/Time
            if (week <= 2) { 
                txt.u.innerText = "Upper: Incline Push-ups"; desc.u.innerText = "3 Sets x 5-8 Reps";
                txt.l.innerText = "Lower: Standard Squats"; desc.l.innerText = "3 Sets x 10 Reps";
                txt.b.innerText = "Back: Doorframe Pulls"; desc.b.innerText = "3 Sets x 10 Reps";
                txt.c.innerText = "Core: Forearm Planks"; desc.c.innerText = "3 Sets x 20 Sec";
            }
            else if (week <= 4) {
                txt.u.innerText = "Upper: Incline Push-ups"; desc.u.innerText = "3 Sets x 8-12 Reps";
                txt.l.innerText = "Lower: Standard Squats"; desc.l.innerText = "3 Sets x 15 Reps";
                txt.b.innerText = "Back: Doorframe Pulls"; desc.b.innerText = "3 Sets x 12 Reps";
                txt.c.innerText = "Core: Forearm Planks"; desc.c.innerText = "3 Sets x 30 Sec";
            }
            else if (week <= 6) {
                txt.u.innerText = "Upper: Floor Push-ups"; desc.u.innerText = "3 Sets x 5-8 Reps";
                txt.l.innerText = "Lower: Reverse Lunges"; desc.l.innerText = "3 Sets x 10 Reps/Leg";
                txt.b.innerText = "Back: Towel Rows"; desc.b.innerText = "3 Sets x 10 Reps";
                txt.c.innerText = "Core: Dead Bugs"; desc.c.innerText = "3 Sets x 10 Reps";
            }
            else if (week <= 8) {
                txt.u.innerText = "Upper: Floor Push-ups"; desc.u.innerText = "3 Sets x 8-12 Reps";
                txt.l.innerText = "Lower: Reverse Lunges"; desc.l.innerText = "3 Sets x 15 Reps/Leg";
                txt.b.innerText = "Back: Towel Rows"; desc.b.innerText = "3 Sets x 12 Reps";
                txt.c.innerText = "Core: Dead Bugs"; desc.c.innerText = "3 Sets x 15 Reps";
            }
            else if (week <= 10) {
                txt.u.innerText = "Upper: Decline Push-ups"; desc.u.innerText = "3 Sets x 5-8 Reps";
                txt.l.innerText = "Lower: Bulgarian Splits"; desc.l.innerText = "3 Sets x 8 Reps/Leg";
                txt.b.innerText = "Back: Doorframe Rows"; desc.b.innerText = "3 Sets x 15 Reps";
                txt.c.innerText = "Core: Hollow Body Holds"; desc.c.innerText = "3 Sets x 30 Sec";
            }
            else {
                txt.u.innerText = "Upper: Decline Push-ups"; desc.u.innerText = "3 Sets x 8-12 Reps (Add Weight)";
                txt.l.innerText = "Lower: Bulgarian Splits"; desc.l.innerText = "3 Sets x 12 Reps/Leg";
                txt.b.innerText = "Back: Doorframe Rows"; desc.b.innerText = "3 Sets x 15 Reps (Lean Back)";
                txt.c.innerText = "Core: Hollow Body Holds"; desc.c.innerText = "3 Sets x 45 Sec";
            }
        }

        function refreshUI() {
            const vis = totalPoints > MAX_POINTS ? MAX_POINTS : totalPoints;
            document.getElementById('currentPoints').innerText = totalPoints;
            document.getElementById('progressBar').style.width = (vis / MAX_POINTS * 100) + '%';
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            for (let i = 0; i < TOTAL_DAYS; i++) {
                const box = document.createElement('div');
                box.className = 'day-box';
                if (completedWorkoutsArray[i]) box.classList.add('completed');
                if (i === currentDayNum - 1) box.classList.add('current');
                grid.appendChild(box);
            }
        }

        async function hardReset() {
            if (!currentUser) { alert("Please log in to reset your cloud data."); return; }
            if(confirm("WARNING: This will permanently erase your 90-day progress, points, and start date. Are you 100% sure?")) {
                totalPoints = 0;
                startDate = new Date().getTime();
                completedWorkoutsArray = Array(TOTAL_DAYS).fill(false);
                document.querySelectorAll('.task-checkbox').forEach(cb => cb.checked = false);
                await db.collection('users').doc(currentUser.uid).set({
                    points: totalPoints,
                    startDate: startDate,
                    calendar: completedWorkoutsArray,
                    todaysCheckboxes: {},
                    lastActiveDate: new Date().toLocaleDateString("en-IN", {timeZone: "Asia/Kolkata"})
                });
                calculateDates();
                calculateDynamicWorkout();
                refreshUI();
                renderCalendar();
                alert("Protocol reset. Welcome back to Day 1.");
            }
        }
    </script>
</body>
</html>
