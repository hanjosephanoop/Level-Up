<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level-Up</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-color: #121212; --panel-bg: #1e1e1e; --accent: #00ffcc;
            --text-main: #ffffff; --text-muted: #aaaaaa;
            --day-bg: #2a2a2a; --day-current: #ffffff;
            /* Heatmap Colors */
            --level-high: #00ffcc; /* Green (>6 tasks) */
            --level-mid: #ffaa00;  /* Yellow (4-6 tasks) */
            --level-low: #ff4444;  /* Red (1-3 tasks) */
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        h1 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; text-align: center; }
        
        .menu-btn { position: fixed; top: 20px; left: 20px; font-size: 24px; background: none; border: none; color: var(--accent); cursor: pointer; z-index: 1001; }
        .side-menu { 
            position: fixed; top: 0; left: 0; width: 280px; height: 100%; background: #181818; 
            z-index: 1000; transform: translateX(-100%); transition: 0.3s ease; border-right: 1px solid #333;
            padding: 60px 20px 20px 20px; box-sizing: border-box;
        }
        .side-menu.active { transform: translateX(0); }
        .menu-header { color: var(--accent); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; opacity: 0.7; }
        .menu-user-email { font-size: 14px; margin-bottom: 30px; word-break: break-all; color: var(--text-main); }
        .menu-item { 
            display: block; width: 100%; padding: 12px; background: #222; border: 1px solid #333; 
            color: white; border-radius: 8px; text-align: left; margin-bottom: 10px; cursor: pointer; font-weight: bold;
        }
        .menu-item:hover { background: #333; border-color: var(--accent); }
        .menu-logout { color: #ff4444; border-color: #442222; margin-top: 40px; }

        .dashboard {
            background-color: var(--panel-bg); border: 2px solid #333; border-radius: 12px;
            padding: 20px; width: 100%; max-width: 600px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.05); margin-bottom: 20px;
        }
        
        .auth-panel { text-align: center; padding: 20px; background: #222; border-radius: 12px; width: 100%; max-width: 400px; }
        .auth-input { padding: 10px; margin: 5px; border-radius: 6px; border: 1px solid #444; background: #333; color: white; width: 80%; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-secondary { background: #444; color: white; }
        
        .stats-container { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .level-display { font-size: 24px; font-weight: bold; color: var(--accent); }
        .score-display { font-size: 14px; color: var(--text-muted); text-align: right; }
        .score-display span { color: var(--accent); font-size: 18px; font-weight: bold; }
        .total-xp-display { font-size: 12px; color: #666; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }

        .day-tracker { 
            font-size: 16px; color: #ffaa00; font-weight: bold; 
            border: 1px solid #ffaa00; padding: 5px 10px; 
            border-radius: 5px; margin-top: 10px;
        }
        
        .calendar-section { margin-top: 15px; margin-bottom: 15px; text-align: center; }
        .calendar-grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 4px; margin-top: 10px; }
        .day-box { aspect-ratio: 1; background-color: var(--day-bg); border-radius: 3px; }
        .day-box.high { background-color: var(--level-high); box-shadow: 0 0 8px var(--level-high); }
        .day-box.mid { background-color: var(--level-mid); box-shadow: 0 0 5px var(--level-mid); }
        .day-box.low { background-color: var(--level-low); box-shadow: 0 0 5px var(--level-low); }
        .day-box.current { border: 2px solid var(--day-current); }

        .progress-bar-container { width: 100%; background-color: #333; border-radius: 10px; height: 15px; overflow: hidden; margin-bottom: 10px; }
        .progress-fill { height: 100%; background-color: var(--accent); width: 0%; transition: width 0.4s ease; }

        .task-section h2 { border-bottom: 1px solid #444; padding-bottom: 5px; font-size: 18px; color: var(--text-muted); text-transform: uppercase; display: flex; justify-content: space-between; }
        .task-item { display: flex; align-items: center; background-color: #2a2a2a; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .task-item input[type="checkbox"] { margin-right: 15px; width: 20px; height: 20px; accent-color: var(--accent); cursor: pointer; }
        .task-title { font-weight: bold; font-size: 16px; }
        .task-points { font-size: 12px; color: var(--accent); margin-top: 3px; display: block; }

        #historyOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); display: none; z-index: 2000;
            overflow-y: auto; padding: 20px; box-sizing: border-box;
        }
        .history-card { background: #222; border: 1px solid #444; border-radius: 8px; padding: 15px; margin-bottom: 10px; max-width: 500px; margin-left: auto; margin-right: auto; }
        .history-day { color: var(--accent); font-weight: bold; font-size: 18px; border-bottom: 1px solid #333; margin-bottom: 10px; }
        .history-check { color: var(--accent); margin-right: 8px; }
        .history-cross { color: #ff4444; margin-right: 8px; }
    </style>
</head>
<body>

    <button class="menu-btn" id="menuBtn" onclick="toggleMenu()" style="display: none;">☰</button>

    <div class="side-menu" id="sideMenu">
        <div class="menu-header">LEVEL UP Account</div>
        <div class="menu-user-email" id="menuEmailDisplay">---</div>
        <button class="menu-item" onclick="toggleHistory(true); toggleMenu();">📜 LEVEL UP Journal</button>
        <button class="menu-item" onclick="hardReset(); toggleMenu();" style="font-size: 12px; color: #888;">⚠️ Hard Reset </button>
        <button class="menu-item menu-logout" onclick="logout()">Log Out</button>
    </div>

    <h1>Level Up</h1>
    
    <div id="authSection" class="auth-panel">
        <h3 style="margin-top:0;">Authentication</h3>
        <input type="email" id="email" class="auth-input" placeholder="Email">
        <input type="password" id="password" class="auth-input" placeholder="Password">
        <br>
        <button class="btn btn-primary" onclick="login()">Log In</button>
        <button class="btn btn-secondary" onclick="register()">Sign Up</button>
        <p id="authError" style="color: #ff4444; font-size: 12px;"></p>
    </div>

    <div id="appInterface" style="display: none; width: 100%; flex-direction: column; align-items: center;">
        <div class="dashboard">
            <div class="stats-container">
                <div>
                    <div class="level-display" id="levelText">Level 1</div>
                    <div class="total-xp-display">Mastery XP: <span id="masteryXP">0</span></div>
                </div>
                <div style="text-align: right;">
                    <div class="score-display">Next Level: <span id="currentPoints">0</span> / 500</div>
                    <div class="day-tracker" id="dayTracker">Day 1 / 90</div>
                </div>
            </div>
            <div class="progress-bar-container"><div class="progress-fill" id="progressBar"></div></div>
            <div class="calendar-section">
                <div style="font-size: 12px; color: var(--text-muted); text-align: left;">Consistency Heatmap</div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>
        </div>

        <div class="dashboard">
            <div class="task-section">
                <h2>Nutrition</h2>
                <label class="task-item"><input type="checkbox" id="cb_protein" class="task-checkbox" value="5" onchange="updatePoints(this)">
                    <div><span class="task-title">Hit 120g-140g Protein</span><span class="task-points">+5 EXP</span></div></label>
                <label class="task-item"><input type="checkbox" id="cb_calories" class="task-checkbox" value="5" onchange="updatePoints(this)">
                    <div><span class="task-title">Caloric Surplus Maintained</span><span class="task-points">+5 EXP</span></div></label>
            </div>
            <div class="task-section">
                <h2>Discipline & Sleep</h2>
                <label class="task-item"><input type="checkbox" id="cb_sleep" class="task-checkbox" value="5" onchange="updatePoints(this)">
                    <div><span class="task-title">Sleep before 11 PM</span><span class="task-points">+5 EXP</span></div></label>
                <label class="task-item"><input type="checkbox" id="cb_wake" class="task-checkbox" value="5" onchange="updatePoints(this)">
                    <div><span class="task-title">Wake up before 7 AM</span><span class="task-points">+5 EXP</span></div></label>
            </div>
            <div class="task-section">
                <h2>Calisthenics <span id="weekIndicator" style="color: var(--accent); font-size: 14px;">Week 1</span></h2>
                <label class="task-item"><input type="checkbox" id="cb_workout_upper" class="task-checkbox" value="5" onchange="updatePoints(this)">
                    <div><span class="task-title" id="text_upper">Upper Body</span><span class="task-points" id="desc_upper">+5 EXP</span></div></label>
                <label class="task-item"><input type="checkbox" id="cb_workout_lower" class="task-checkbox" value="5" onchange="updatePoints(this)">
                    <div><span class="task-title" id="text_lower">Lower Body</span><span class="task-points" id="desc_lower">+5 EXP</span></div></label>
                <label class="task-item"><input type="checkbox" id="cb_workout_back" class="task-checkbox" value="5" onchange="updatePoints(this)">
                    <div><span class="task-title" id="text_back">Back / Pulls</span><span class="task-points" id="desc_back">+5 EXP</span></div></label>
                <label class="task-item"><input type="checkbox" id="cb_workout_core" class="task-checkbox" value="5" onchange="updatePoints(this)">
                    <div><span class="task-title" id="text_core">Core Strength</span><span class="task-points" id="desc_core">+5 EXP</span></div></label>
            </div>
            <div class="task-section" style="margin-bottom: 0;">
                <h2>Hygiene</h2>
                <label class="task-item" style="margin-bottom: 0;"><input type="checkbox" id="cb_hygiene" class="task-checkbox" value="10" onchange="updatePoints(this)">
                    <div><span class="task-title">Daily Body Care Routine Executed</span><span class="task-points">+10 EXP</span></div></label>
            </div>
        </div>
    </div>

    <div id="historyOverlay">
        <h2 style="text-align: center; color: var(--accent);">LEVEL UP Journal</h2>
        <div style="text-align: center; margin-bottom: 20px;"><button class="btn btn-secondary" onclick="toggleHistory(false)">Close Journal</button></div>
        <div id="historyContainer"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAQqPjM9TlwRFXnSFs1rkXFApXSOrI3hOw",
            authDomain: "glow-up-protocol.firebaseapp.com",
            projectId: "glow-up-protocol",
            storageBucket: "glow-up-protocol.firebasestorage.app",
            messagingSenderId: "58663914559",
            appId: "1:58663914559:web:96016980d10e1331d87c8a",
            measurementId: "G-0EWGLZ0TT6"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const MAX_POINTS_PER_LEVEL = 500;
        const TOTAL_DAYS = 90;
        let currentUser = null;
        let totalCumulativePoints = 0;
        let startDate = null;
        let completedWorkoutsArray = Array(TOTAL_DAYS).fill(0); 
        let historyObj = {}; 
        let currentDayNum = 1;

        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('appInterface').style.display = 'flex';
                document.getElementById('menuBtn').style.display = 'block';
                document.getElementById('menuEmailDisplay').innerText = user.email;
                syncDataFromCloud();
            } else {
                currentUser = null;
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('appInterface').style.display = 'none';
                document.getElementById('menuBtn').style.display = 'none';
            }
        });

        function register() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            auth.createUserWithEmailAndPassword(e, p).catch(err => document.getElementById('authError').innerText = err.message);
        }
        function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => document.getElementById('authError').innerText = err.message);
        }
        function logout() { auth.signOut(); }

        async function syncDataFromCloud() {
            if (!currentUser) return;
            const docRef = db.collection('users').doc(currentUser.uid);
            const doc = await docRef.get();
            
            if (doc.exists) {
                const data = doc.data();
                totalCumulativePoints = data.points || 0;
                startDate = data.startDate;
                completedWorkoutsArray = (data.calendar || Array(TOTAL_DAYS).fill(0)).map(val => val === true ? 9 : (val === false ? 0 : val));
                historyObj = data.history || {};

                if (!startDate) {
                    startDate = getStartOfToday();
                    await docRef.update({ startDate: startDate });
                }

                calculateDates(); // Update currentDayNum first
                const currentISTString = getISTDateString();
                
                if (data.lastActiveDate !== currentISTString) {
                    document.querySelectorAll('.task-checkbox').forEach(cb => cb.checked = false);
                    saveDataToCloud();
                } else {
                    const boxes = data.todaysCheckboxes || {};
                    document.querySelectorAll('.task-checkbox').forEach(cb => {
                        cb.checked = boxes[cb.id] === true;
                    });
                }
            } else {
                startDate = getStartOfToday();
                saveDataToCloud();
            }
            calculateDynamicWorkout();
            refreshUI();
            renderCalendar();
        }

        function saveDataToCloud() {
            if (!currentUser) return;
            let checkboxStates = {};
            let count = 0;
            document.querySelectorAll('.task-checkbox').forEach(cb => {
                checkboxStates[cb.id] = cb.checked;
                if(cb.checked) count++;
            });

            const historyKey = `day_${currentDayNum}`;
            historyObj[historyKey] = checkboxStates;
            completedWorkoutsArray[currentDayNum - 1] = count;

            db.collection('users').doc(currentUser.uid).set({
                points: totalCumulativePoints,
                startDate: startDate,
                calendar: completedWorkoutsArray,
                todaysCheckboxes: checkboxStates,
                history: historyObj,
                lastActiveDate: getISTDateString()
            }, { merge: true });
        }

        function calculateDates() {
            if (!startDate) return;
            const today = getStartOfToday();
            const diff = today - startDate;
            currentDayNum = Math.floor(diff / (1000 * 60 * 60 * 24)) + 1;
            if (currentDayNum > TOTAL_DAYS) currentDayNum = TOTAL_DAYS;
            if (currentDayNum < 1) currentDayNum = 1;
            document.getElementById('dayTracker').innerText = `Day ${currentDayNum} / 90`;
        }

        function getStartOfToday() {
            const now = new Date();
            const istDateStr = now.toLocaleString("en-US", {timeZone: "Asia/Kolkata"});
            const istDate = new Date(istDateStr);
            istDate.setHours(0, 0, 0, 0);
            return istDate.getTime();
        }

        function getISTDateString() { return new Date().toLocaleDateString("en-IN", {timeZone: "Asia/Kolkata"}); }

        function updatePoints(checkbox) {
            const val = parseInt(checkbox.value);
            totalCumulativePoints += checkbox.checked ? val : -val;
            refreshUI();
            saveDataToCloud();
            renderCalendar();
        }

        function toggleHistory(show) {
            const overlay = document.getElementById('historyOverlay');
            const container = document.getElementById('historyContainer');
            if (show) {
                container.innerHTML = "";
                const keys = Object.keys(historyObj).sort((a, b) => parseInt(b.split('_')[1]) - parseInt(a.split('_')[1]));
                if (keys.length === 0) container.innerHTML = "<p style='text-align:center;'>No history recorded yet.</p>";
                keys.forEach(key => {
                    const day = key.split('_')[1];
                    const data = historyObj[key];
                    const card = document.createElement('div');
                    card.className = 'history-card';
                    card.innerHTML = `<div class="history-day">Day ${day}</div>`;
                    Object.keys(data).forEach(taskID => {
                        const status = data[taskID] ? '<span class="history-check">✔</span>' : '<span class="history-cross">✖</span>';
                        let taskName = taskID.replace('cb_', '').replace(/_/g, ' ');
                        taskName = taskName.charAt(0).toUpperCase() + taskName.slice(1);
                        card.innerHTML += `<div style="font-size:14px; margin-bottom:4px;">${status} ${taskName}</div>`;
                    });
                    container.appendChild(card);
                });
                overlay.style.display = 'block';
            } else { overlay.style.display = 'none'; }
        }

        function calculateDynamicWorkout() {
            const week = Math.ceil(currentDayNum / 7);
            document.getElementById('weekIndicator').innerText = `Week ${week > 12 ? 12 : week}`;
            const txt = { u: document.getElementById('text_upper'), l: document.getElementById('text_lower'), b: document.getElementById('text_back'), c: document.getElementById('text_core') };
            const desc = { u: document.getElementById('desc_upper'), l: document.getElementById('desc_lower'), b: document.getElementById('desc_back'), c: document.getElementById('desc_core') };
            
            if (week <= 2) { 
                txt.u.innerText = "Upper: Incline Push-ups"; desc.u.innerText = "3 Sets x 5-8 Reps";
                txt.l.innerText = "Lower: Standard Squats"; desc.l.innerText = "3 Sets x 10 Reps";
                txt.b.innerText = "Back: Doorframe Pulls"; desc.b.innerText = "3 Sets x 10 Reps";
                txt.c.innerText = "Core: Forearm Planks"; desc.c.innerText = "3 Sets x 20 Sec";
            } else if (week <= 4) {
                txt.u.innerText = "Upper: Incline Push-ups"; desc.u.innerText = "3 Sets x 8-12 Reps";
                txt.l.innerText = "Lower: Standard Squats"; desc.l.innerText = "3 Sets x 15 Reps";
                txt.b.innerText = "Back: Doorframe Pulls"; desc.b.innerText = "3 Sets x 12 Reps";
                txt.c.innerText = "Core: Forearm Planks"; desc.c.innerText = "3 Sets x 30 Sec";
            } else if (week <= 6) {
                txt.u.innerText = "Upper: Floor Push-ups"; desc.u.innerText = "3 Sets x 5-8 Reps";
                txt.l.innerText = "Lower: Reverse Lunges"; desc.l.innerText = "3 Sets x 10 Reps/Leg";
                txt.b.innerText = "Back: Towel Rows"; desc.b.innerText = "3 Sets x 10 Reps";
                txt.c.innerText = "Core: Dead Bugs"; desc.c.innerText = "3 Sets x 10 Reps";
            } else if (week <= 8) {
                txt.u.innerText = "Upper: Floor Push-ups"; desc.u.innerText = "3 Sets x 8-12 Reps";
                txt.l.innerText = "Lower: Reverse Lunges"; desc.l.innerText = "3 Sets x 15 Reps/Leg";
                txt.b.innerText = "Back: Towel Rows"; desc.b.innerText = "3 Sets x 12 Reps";
                txt.c.innerText = "Core: Dead Bugs"; desc.c.innerText = "3 Sets x 15 Reps";
            } else if (week <= 10) {
                txt.u.innerText = "Upper: Decline Push-ups"; desc.u.innerText = "3 Sets x 5-8 Reps";
                txt.l.innerText = "Lower: Bulgarian Splits"; desc.l.innerText = "3 Sets x 8 Reps/Leg";
                txt.b.innerText = "Back: Doorframe Rows"; desc.b.innerText = "3 Sets x 15 Reps";
                txt.c.innerText = "Core: Hollow Body Holds"; desc.c.innerText = "3 Sets x 30 Sec";
            } else {
                txt.u.innerText = "Upper: Decline Push-ups"; desc.u.innerText = "3 Sets x 8-12 Reps (Add Weight)";
                txt.l.innerText = "Lower: Bulgarian Splits"; desc.l.innerText = "3 Sets x 12 Reps/Leg";
                txt.b.innerText = "Back: Doorframe Rows"; desc.b.innerText = "3 Sets x 15 Reps (Lean Back)";
                txt.c.innerText = "Core: Hollow Body Holds"; desc.c.innerText = "3 Sets x 45 Sec";
            }
        }

        function refreshUI() {
            const currentLevel = Math.floor(totalCumulativePoints / MAX_POINTS_PER_LEVEL) + 1;
            const pointsInCurrentLevel = totalCumulativePoints % MAX_POINTS_PER_LEVEL;
            document.getElementById('levelText').innerText = `Level ${currentLevel}`;
            document.getElementById('masteryXP').innerText = totalCumulativePoints;
            document.getElementById('currentPoints').innerText = pointsInCurrentLevel;
            document.getElementById('progressBar').style.width = (pointsInCurrentLevel / MAX_POINTS_PER_LEVEL * 100) + '%';
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            for (let i = 0; i < TOTAL_DAYS; i++) {
                const box = document.createElement('div');
                box.className = 'day-box';
                const score = completedWorkoutsArray[i] || 0;
                if (score > 6) box.classList.add('high');
                else if (score > 3) box.classList.add('mid');
                else if (score > 0) box.classList.add('low');
                if (i === currentDayNum - 1) box.classList.add('current');
                grid.appendChild(box);
            }
        }

        async function hardReset() {
            if (!currentUser) return;
            if(confirm("DANGER: This will permanently erase ALL data. Proceed?")) {
                totalCumulativePoints = 0;
                startDate = getStartOfToday();
                completedWorkoutsArray = Array(TOTAL_DAYS).fill(0);
                historyObj = {};
                document.querySelectorAll('.task-checkbox').forEach(cb => cb.checked = false);
                await db.collection('users').doc(currentUser.uid).set({
                    points: 0, startDate: startDate, calendar: completedWorkoutsArray,
                    todaysCheckboxes: {}, history: {}, lastActiveDate: getISTDateString()
                });
                calculateDates(); calculateDynamicWorkout(); refreshUI(); renderCalendar();
                alert("Protocol reset.");
            }
        }
    </script>
</body>
</html>
